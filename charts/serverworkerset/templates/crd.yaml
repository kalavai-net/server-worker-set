apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: serverworkersets.kalavai.net
spec:
  group: kalavai.net
  names:
    kind: ServerWorkerSet
    plural: serverworkersets
    singular: serverworkerset
    shortNames:
      - sws
  scope: Namespaced
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - serverPodSpec
                - workerPodSpec
              properties:
                replicas:
                  type: integer
                  minimum: 0
                  description: Number of (server + N-worker) instances. KEDA scales this via /scale subresource.
                workersPerInstance:
                  type: integer
                  minimum: 1
                  default: 1
                  description: Number of worker pods per server instance (fixed, not scaled by KEDA).
                serverService:
                  type: object
                  description: >-
                    Controls how the global server Service is exposed. A single Service selects
                    all server pods and round-robins (or sticky-sessions) requests across them.
                  properties:
                    port:
                      type: integer
                      minimum: 1
                      maximum: 65535
                      description: Port exposed on the global server Service.
                    targetPort:
                      type: integer
                      minimum: 1
                      maximum: 65535
                      description: Container port to forward to. Defaults to port if omitted.
                    stickySession:
                      type: boolean
                      default: false
                      description: Enable client-IP-based session affinity on the global Service.
                    stickySessionTimeoutSeconds:
                      type: integer
                      minimum: 1
                      maximum: 86400
                      default: 10800
                      description: Timeout for sticky session affinity in seconds (default 3h).
                    type:
                      type: string
                      enum: ["ClusterIP", "NodePort"]
                      default: "ClusterIP"
                      description: >
                        Kubernetes Service type for the global service.
                        "ClusterIP" (default) is only reachable within the cluster.
                        "NodePort" exposes the service on each node's IP at a static port.
                serverPodSpec:
                  type: object
                  description: Pod spec for the single server pod.
                  x-kubernetes-preserve-unknown-fields: true
                workerPodSpec:
                  type: object
                  description: Pod spec for each worker pod.
                  x-kubernetes-preserve-unknown-fields: true
                serverPolicy:
                  type: array
                  description: >
                    List of event-action policies for server pods. When a server pod
                    enters a matching state, the specified action is taken.
                  items:
                    type: object
                    required:
                      - event
                      - action
                    properties:
                      event:
                        type: string
                        enum: ["PodFailed", "PodEvicted", "CrashLoopBackOff", "ImagePullBackOff", "ErrImagePull", "CreateContainerError", "OOMKilled", "Unknown"]
                        description: Pod status event to watch for.
                      action:
                        type: string
                        enum: ["RestartInstance", "ReplacePod"]
                        description: >
                          RestartInstance deletes and recreates all pods (server + workers) in the instance.
                          ReplacePod deletes only the offending pod (statefulset will recreate it).
                workerPolicy:
                  type: array
                  description: >
                    List of event-action policies for worker pods. When a worker pod
                    enters a matching state, the specified action is taken.
                  items:
                    type: object
                    required:
                      - event
                      - action
                    properties:
                      event:
                        type: string
                        enum: ["PodFailed", "PodEvicted", "CrashLoopBackOff", "ImagePullBackOff", "ErrImagePull", "CreateContainerError", "OOMKilled", "Unknown"]
                        description: Pod status event to watch for.
                      action:
                        type: string
                        enum: ["RestartInstance", "ReplacePod"]
                        description: >
                          RestartInstance deletes and recreates all pods (server + workers) in the instance.
                          ReplacePod deletes only the offending pod (statefulset will recreate it).
                labels:
                  type: object
                  description: >
                    Custom labels to apply to all resources created by this ServerWorkerSet.
                    These labels will be merged with the default system labels.
                  additionalProperties:
                    type: string
                  x-kubernetes-preserve-unknown-fields: true
                autoScaling:
                  type: object
                  description: >
                    Optional HTTP-based autoscaling via KEDA HTTPScaledObject.
                    Requires the KEDA HTTP add-on to be installed in the cluster.
                  properties:
                    enabled:
                      type: boolean
                      default: false
                      description: Enable or disable autoscaling. When false, no HTTPScaledObject is created.
                    hosts:
                      type: array
                      description: >
                        List of hostnames that KEDA HTTP add-on matches to route and scale traffic.
                        Corresponds to HTTPScaledObject.spec.hosts.
                      items:
                        type: string
                    pathPrefixes:
                      type: array
                      description: >
                        List of path prefixes that KEDA HTTP add-on listens to for scaling.
                        Corresponds to HTTPScaledObject.spec.pathPrefixes.
                      items:
                        type: string
                      default: ["/"]
                    replicas:
                      type: object
                      description: Minimum and maximum replica count for autoscaling.
                      properties:
                        min:
                          type: integer
                          minimum: 0
                          default: 0
                          description: Minimum number of instances (can be 0 for scale-to-zero).
                        max:
                          type: integer
                          minimum: 1
                          description: Maximum number of instances.
                    scaledownPeriod:
                      type: integer
                      minimum: 0
                      default: 300
                      description: >
                        Seconds to wait after the last request before scaling down.
                        Corresponds to HTTPScaledObject.spec.scaledownPeriod.
                    scalingMetric:
                      type: object
                      description: >
                        Scaling metric configuration passed verbatim to HTTPScaledObject.spec.scalingMetric.
                        Supports requestRate or concurrency sub-objects.
                      x-kubernetes-preserve-unknown-fields: true
            status:
              type: object
              properties:
                replicas:
                  type: integer
                  description: Current number of ready instances (used by KEDA).
                selector:
                  type: string
                  description: Label selector covering all pods in this ServerWorkerSet (used by KEDA).
                readyInstances:
                  type: integer
                  description: Number of fully-ready instances (server + all workers ready).
                instances:
                  type: array
                  description: Per-instance DNS addresses.
                  items:
                    type: object
                    properties:
                      index:
                        type: integer
                      serverAddress:
                        type: string
                conditions:
                  type: array
                  items:
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
      additionalPrinterColumns:
        - name: Instances
          type: integer
          jsonPath: .spec.replicas
        - name: WorkersPerInstance
          type: integer
          jsonPath: .spec.workersPerInstance
        - name: Ready
          type: integer
          jsonPath: .status.readyInstances
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      subresources:
        status: {}
        scale:
          specReplicasPath: .spec.replicas
          statusReplicasPath: .status.replicas
          labelSelectorPath: .status.selector