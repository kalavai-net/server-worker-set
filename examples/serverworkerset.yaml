apiVersion: kalavai.net/v1
kind: ServerWorkerSet
metadata:
  name: my-sws
  namespace: default
spec:
  replicas: 2              # number of (server + N-worker) instances — KEDA scales this
  workersPerInstance: 2   # each instance has 1 server + 4 workers
  # Custom labels applied to all resources created by this ServerWorkerSet
  labels:
    custom-label: "value"
  server:
    template:
      containers:
      - name: server
        image: python:3.12-slim
        # SERVER_ADDRESS and WORKERS_ADDRESSES are injected per-instance automatically.
        # e.g. SERVER_ADDRESS=my-sws-0-server-0.my-sws-0-server.default.svc.cluster.local
        command: 
        - bash
        - -c
        - |
          echo "Starting server..."
          apt update && apt install -y iputils-ping
          echo "SERVER_ADDRESS: $SERVER_ADDRESS"
          echo "WORKERS_ADDRESSES: $WORKERS_ADDRESSES"
          echo "Pinging workers from server..."
          IFS=',' read -ra WORKERS <<< "$WORKERS_ADDRESSES"
          for WORKER in "${WORKERS[@]}"; do
            WORKER=$(echo "$WORKER" | tr -d ' ')
            echo -n "  Ping $WORKER: "
            ping -c 3 "$WORKER" && echo "OK" || echo "FAILED"
          done
          python -m http.server 8080
        ports:
          - containerPort: 8080
        # resources:
        #   limits:
        #     nvidia.com/gpu: "1"
    policy:
    # Restart the entire instance (server + all workers) if server fails
    - event: PodFailed
      action: RestartInstance
    # Replace just the server pod on OOM kill (may recover with fresh memory)
    - event: OOMKilled
      action: RestartInstance
    # Restart instance on eviction to migrate the whole workload
    - event: PodEvicted
      action: RestartInstance
    - event: Unknown
      action: RestartInstance
  worker:
    template:
      containers:
      - name: worker
        image: python:3.12-slim
        # SERVER_ADDRESS points to THIS instance's server (not shared across instances).
        command:
          - bash
          - -c
          - |
            echo "Starting worker..."
            apt update && apt install -y iputils-ping
            echo "SERVER_ADDRESS: $SERVER_ADDRESS"
            echo "WORKERS_ADDRESSES: $WORKERS_ADDRESSES"
            echo "Pinging server from worker..."
            ping -c 3 "$SERVER_ADDRESS" && echo "Ping to server OK" || echo "Ping to server FAILED"
            tail -f /dev/null
        # resources:
        #   limits:
        #     nvidia.com/gpu: "1"
    policy:
    # Workers typically just get replaced on failure (other workers keep running)
    - event: PodFailed
      action: ReplacePod
    # OOM killed workers get replaced with fresh pod
    - event: OOMKilled
      action: ReplacePod
    # Evicted workers get replaced (only affects this worker)
    - event: PodEvicted
      action: ReplacePod
    # Unknown state - try replacing first
    - event: Unknown
      action: ReplacePod
  # service controls how the single shared server Service is exposed.
  service:
    port: 8080           # port on the ClusterIP service
    targetPort: 8080     # container port (defaults to port)
    stickySession: true  # pin a client IP to one server pod
    stickySessionTimeoutSeconds: 10800  # 3 h default
    type: NodePort  # ClusterIP (default) or NodePort
  autoScaling:
    enabled: false       # set to true to create an HTTPScaledObject (requires KEDA HTTP add-on)
    hosts:
      - test.spaces.kalavai.net       # hostname(s) KEDA HTTP add-on routes traffic for
    pathPrefixes:
      - "/"              # path prefixes for scaling (default: ["/"])
    replicas:
      min: 0             # 0 enables scale-to-zero
      max: 2
    scaledownPeriod: 300 # seconds idle before scaling down
    scalingMetric:
      requestRate:
        granularity: 1s
        targetValue: 1
        window: 1m
      # concurrency:
      #   targetValue: 10
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: my-sws-ingress
spec:
  ingressClassName: traefik
  rules:
  - host: test.spaces.kalavai.net
    http:
      paths:
      - backend:
          service:
            name: my-sws-service
            port:
              number: 8080 # match internal port
        path: /
        pathType: Prefix