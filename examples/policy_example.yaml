apiVersion: kalavai.net/v1
kind: ServerWorkerSet
metadata:
  name: policy-demo-job
  namespace: default
spec:
  replicas: 2              
  workersPerInstance: 2
  serverService:
    port: 8080
    targetPort: 8080
    stickySession: true
    serviceType: ClusterIP

  # Server policies - applied when server pods encounter issues
  serverPolicy:
    # Restart the entire instance (server + all workers) if server fails
    - event: PodFailed
      action: RestartInstance
    # Replace just the server pod on OOM kill (may recover with fresh memory)
    - event: OOMKilled
      action: ReplacePod
    # Restart instance on eviction to migrate the whole workload
    - event: PodEvicted
      action: RestartInstance
    # Handle image pull issues by replacing just the pod
    - event: ImagePullBackOff
      action: ReplacePod
    - event: CrashLoopBackOff
      action: RestartInstance

  # Worker policies - can have different rules than servers
  workerPolicy:
    # Workers typically just get replaced on failure (other workers keep running)
    - event: PodFailed
      action: ReplacePod
    # OOM killed workers get replaced with fresh pod
    - event: OOMKilled
      action: ReplacePod
    # Evicted workers get replaced (only affects this worker)
    - event: PodEvicted
      action: ReplacePod
    # Image issues trigger pod replacement
    - event: ImagePullBackOff
      action: ReplacePod
    - event: ErrImagePull
      action: ReplacePod
    # If a worker keeps crashing, restart might indicate deeper issue
    - event: CrashLoopBackOff
      action: ReplacePod
    # Unknown state - try replacing first
    - event: Unknown
      action: ReplacePod

  # Available events:
  #   PodFailed        - Pod phase is Failed
  #   PodEvicted       - Pod was evicted (e.g., node pressure, spot termination)
  #   CrashLoopBackOff - Container is repeatedly crashing
  #   ImagePullBackOff - Cannot pull container image
  #   ErrImagePull     - Error pulling container image
  #   CreateContainerError - Failed to create container
  #   OOMKilled        - Container killed due to out of memory
  #   Unknown          - Pod phase is Unknown

  # Available actions:
  #   RestartInstance  - Delete and recreate all StatefulSets for this instance
  #                     (both server and all workers are restarted together)
  #   ReplacePod       - Delete only the offending pod
  #                     (StatefulSet will automatically recreate it)

  serverPodSpec:
    containers:
      - name: server
        image: python:3.12-slim
        command: 
        - bash
        - -c
        - |
          echo "Starting server..."
          python -m http.server 8080
        ports:
          - containerPort: 8080
        resources:
          requests:
            memory: "128Mi"
          limits:
            memory: "256Mi"

  workerPodSpec:
    containers:
      - name: worker
        image: python:3.12-slim
        command:
          - bash
          - -c
          - |
            echo "Starting worker..."
            echo "SERVER_ADDRESS: $SERVER_ADDRESS"
            tail -f /dev/null
        resources:
          requests:
            memory: "64Mi"
          limits:
            memory: "128Mi"
