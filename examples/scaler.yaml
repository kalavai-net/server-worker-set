# NOTE: This standalone HTTPScaledObject is kept as a reference.
# Prefer using spec.autoScaling in the ServerWorkerSet CR instead,
# which manages this resource automatically when autoScaling.enabled=true.
kind: HTTPScaledObject
apiVersion: http.keda.sh/v1alpha1
metadata:
  name: my-llm-job-scaler
spec:
  hosts:
    - my-llm-job.example.com # matches the "host" in the request to the service at scaleTargetRef (if using ingress, matches the host field)
  pathPrefixes:
    - /
  scaleTargetRef:
    name: my-llm-job
    kind: ServerWorkerSet
    apiVersion: kalavai.net/v1
    service: my-llm-job-service
    port: 8080
  replicas:
    min: 0
    max: 3
  scaledownPeriod: 30
  scalingMetric:
    requestRate:
      granularity: 1s
      targetValue: 1
      window: 1m
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: my-llm-job-ingress
spec:
  ingressClassName: traefik
  rules:
  - host: my-llm-job.example.com
    http:
      paths:
      - backend:
          service:
            name: my-llm-job-service
            port:
              number: 8080 # match internal port
        path: /
        pathType: Prefix